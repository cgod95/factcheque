<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factcheque — money, influence &amp; UK legislation</title>
    <meta
      name="description"
      content="A neutral, public-record map of the money and foreign influence behind UK laws — clear, rigorously-sourced case files showing who funds, shapes and benefits from each bill."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="theme-color" content="#fbfaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#131619" media="(prefers-color-scheme: dark)" />

    <!-- Social cards. NOTE on deploy: set og:url to the live URL, and for best
         cross-platform cards rasterise og-image.svg to a 1200x630 PNG and point
         og:image / twitter:image at its absolute URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Factcheque" />
    <meta property="og:title" content="Factcheque — money, influence &amp; UK legislation" />
    <meta
      property="og:description"
      content="A neutral, public-record map of the money and foreign influence behind UK laws."
    />
    <meta property="og:image" content="./og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Factcheque — money, influence &amp; UK legislation" />
    <meta
      name="twitter:description"
      content="A neutral, public-record map of the money and foreign influence behind UK laws."
    />
    <meta name="twitter:image" content="./og-image.svg" />
    <script>
      // Apply the saved (or system) theme before paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('factcheque-theme')
          var dark = stored
            ? stored === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
